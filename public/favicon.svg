<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Left ear outer -->
  <polygon points="14,48 27,8 43,42" fill="#fce4f0" stroke="#e0479e" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right ear outer -->
  <polygon points="86,48 73,8 57,42" fill="#fce4f0" stroke="#e0479e" stroke-width="3" stroke-linejoin="round"/>
  <!-- Left ear inner -->
  <polygon points="20,44 29,18 40,40" fill="#f9b8da" stroke="none"/>
  <!-- Right ear inner -->
  <polygon points="80,44 71,18 60,40" fill="#f9b8da" stroke="none"/>
  <!-- Head -->
  <ellipse cx="50" cy="62" rx="38" ry="33" fill="#fce4f0" stroke="#e0479e" stroke-width="3"/>
  <!-- Left eye (cat slit) -->
  <ellipse cx="36" cy="57" rx="4.5" ry="6" fill="#e0479e"/>
  <ellipse cx="36" cy="57" rx="1.5" ry="5.5" fill="#3d1a2e"/>
  <!-- Right eye (cat slit) -->
  <ellipse cx="64" cy="57" rx="4.5" ry="6" fill="#e0479e"/>
  <ellipse cx="64" cy="57" rx="1.5" ry="5.5" fill="#3d1a2e"/>
  <!-- Nose -->
  <polygon points="50,67 47,72 53,72" fill="#f43f6a"/>
  <!-- Mouth -->
  <path d="M47,72 Q50,77 53,72" stroke="#f43f6a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left whiskers -->
  <line x1="8" y1="65" x2="38" y2="67" stroke="#c49ab5" stroke-width="1.5"/>
  <line x1="8" y1="72" x2="38" y2="71" stroke="#c49ab5" stroke-width="1.5"/>
  <!-- Right whiskers -->
  <line x1="92" y1="65" x2="62" y2="67" stroke="#c49ab5" stroke-width="1.5"/>
  <line x1="92" y1="72" x2="62" y2="71" stroke="#c49ab5" stroke-width="1.5"/>
</svg>
